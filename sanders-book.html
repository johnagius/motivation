<style>
:root{
  --void:#05070f; --deep:#0a0e1c; --ink:#0c1226;
  --cream:#f3ecd9; --cream-dim:#cfc7b3;
  --gold:#e8b85f; --gold-soft:#c89a4a; --steel:#7d93b8;
  --glow:rgba(232,184,95,0.35);
  --page:#100a06;            /* deep aged-paper-in-space */
  --page-edge:#1d1812;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(30,42,74,0.55), transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 90%, rgba(232,184,95,0.06), transparent 60%),
    var(--void);
  color:var(--cream); font-family:'Spectral',serif;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; overflow:hidden;
}
/* starfield */
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.star{position:absolute;background:#fff;border-radius:50%;animation:tw var(--dur,4s) ease-in-out infinite;opacity:.5;}
@keyframes tw{0%,100%{opacity:.12;}50%{opacity:.8;}}
/* grain */
body::after{content:"";position:fixed;inset:0;z-index:60;pointer-events:none;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

/* ===== BOOK ===== */
#book{
  position:relative; z-index:2;
  width:min(94vw, 1080px);
  height:min(86vh, 680px);
  perspective:2600px;
  display:flex;
}
.leaf{
  position:relative; width:50%; height:100%;
  background:linear-gradient(110deg, var(--page), var(--page-edge));
  overflow:hidden;
}
.leaf.left{
  border-radius:6px 0 0 6px;
  box-shadow:inset -28px 0 50px -28px rgba(0,0,0,0.85), 0 30px 70px -20px rgba(0,0,0,0.7);
  border:1px solid rgba(232,184,95,0.10); border-right:none;
}
.leaf.right{
  border-radius:0 6px 6px 0;
  box-shadow:inset 28px 0 50px -28px rgba(0,0,0,0.85), 0 30px 70px -20px rgba(0,0,0,0.7);
  border:1px solid rgba(232,184,95,0.10); border-left:none;
}
/* the center gutter shadow */
#book::after{content:"";position:absolute;top:0;bottom:0;left:50%;width:36px;transform:translateX(-50%);
  background:linear-gradient(90deg,transparent,rgba(0,0,0,0.55),transparent);z-index:30;pointer-events:none;}

/* page content */
.pg{position:absolute;inset:0;padding:46px 52px;display:flex;flex-direction:column;
  justify-content:center;backface-visibility:hidden;}
.leaf.left .pg{padding-right:60px;}
.leaf.right .pg{padding-left:60px;}

/* flipping leaf overlay */
.flip{
  position:absolute; top:0; right:0; width:50%; height:100%;
  transform-origin:left center; transform-style:preserve-3d;
  z-index:40; pointer-events:none;
}
.flip .face{position:absolute;inset:0;backface-visibility:hidden;overflow:hidden;
  background:linear-gradient(110deg,var(--page),var(--page-edge));}
.flip .front{border-radius:0 6px 6px 0;box-shadow:inset 28px 0 50px -28px rgba(0,0,0,0.85);}
.flip .back{border-radius:6px 0 0 6px;transform:rotateY(180deg);
  box-shadow:inset -28px 0 50px -28px rgba(0,0,0,0.85);}
.flip .shade{position:absolute;inset:0;background:rgba(0,0,0,0);transition:none;}

/* ---- typography per page type ---- */
.folio{position:absolute;top:30px;left:52px;font-family:'Oswald',sans-serif;
  font-size:.62rem;letter-spacing:.3em;color:var(--gold-soft);opacity:.7;}
.leaf.right .folio{left:auto;right:52px;}

blockquote{font-family:'Cormorant Garamond',serif;font-weight:500;font-style:italic;
  font-size:clamp(1.4rem,2.4vw,2.15rem);line-height:1.32;color:var(--cream);}
blockquote .accent{color:var(--gold);}
.vrule{width:46px;height:1px;background:var(--gold-soft);opacity:.6;margin:22px 0;}
.refl{font-family:'Spectral',serif;font-weight:300;font-size:clamp(.92rem,1.5vw,1.06rem);
  line-height:1.7;color:var(--cream-dim);}

/* verse line-art motif (matches the mission-stage art treatment) */
.verse{justify-content:center;}
.verse-art{width:100%;max-width:188px;margin:0 0 22px;}
.leaf.right .verse-art{margin-left:auto;margin-right:0;}
.verse-art svg{width:100%;height:auto;display:block;overflow:visible;}
/* reflection-only page (used for the long Mallory verse split) */
.refl-page{justify-content:center;}
.refl.big{font-size:clamp(1.05rem,1.9vw,1.32rem);line-height:1.78;font-style:italic;color:var(--cream);}

/* cover */
.cover{align-items:flex-start;}
.moon-emblem{width:92px;height:92px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fdfbf3,#d8d2c0 45%,#9b9685 80%,#6f6b5e);
  box-shadow:0 0 50px 6px var(--glow),inset -10px -8px 22px rgba(0,0,0,0.5);margin-bottom:30px;}
.cover-eyebrow{font-family:'Oswald',sans-serif;font-weight:300;letter-spacing:.34em;
  text-transform:uppercase;font-size:.62rem;color:var(--gold);margin-bottom:18px;}
.cover-title{font-family:'Cormorant Garamond',serif;font-weight:500;
  font-size:clamp(2.4rem,5vw,3.8rem);line-height:1;color:var(--cream);}
.cover-title em{font-style:italic;color:var(--gold);}
.cover2{align-items:flex-start;}
.cover-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:2rem;color:var(--gold);}
.cover-rule{width:60px;height:1px;background:var(--gold-soft);margin:20px 0;}
.cover-place{font-family:'Oswald',sans-serif;font-weight:300;letter-spacing:.22em;
  text-transform:uppercase;font-size:.72rem;color:var(--steel);line-height:2;}
.cover-note{margin-top:30px;font-style:italic;font-weight:300;color:var(--cream-dim);font-size:1rem;}

/* journey intro */
.jintro{align-items:flex-start;}
.eyebrow2{font-family:'Oswald',sans-serif;font-weight:300;letter-spacing:.4em;
  text-transform:uppercase;font-size:.62rem;color:var(--gold);margin-bottom:18px;}
.jintro h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-style:italic;
  font-size:clamp(1.8rem,3.4vw,2.8rem);line-height:1.05;color:var(--cream);margin-bottom:20px;}
.jintro p{font-weight:300;font-size:clamp(.95rem,1.6vw,1.12rem);color:var(--cream-dim);line-height:1.75;}

/* stage page */
.stage-a, .stage-b{justify-content:flex-start;padding-top:44px;}
.stage-a .stage-art{width:100%;max-width:250px;margin:0 auto 22px;}
.stage-a .stage-art svg{width:100%;height:auto;display:block;overflow:visible;}
.phase{font-family:'Oswald',sans-serif;font-weight:400;letter-spacing:.24em;text-transform:uppercase;
  font-size:.62rem;color:var(--gold-soft);margin-bottom:10px;text-align:center;}
.stage-a h3, .stage-b h3{font-family:'Cormorant Garamond',serif;font-weight:500;
  font-size:clamp(1.5rem,2.8vw,2.1rem);color:var(--cream);line-height:1.1;margin-bottom:18px;text-align:center;}
.stage-b h3.ghost{color:var(--cream-dim);opacity:.55;font-style:italic;}
.stage-a p, .stage-b p{font-weight:300;font-size:clamp(.95rem,1.6vw,1.12rem);line-height:1.7;margin-bottom:12px;}
.stage-b{justify-content:center;}
.stage-b .vrule{margin:0 auto 22px;}
.lbl{display:block;font-family:'Oswald',sans-serif;font-weight:400;letter-spacing:.2em;
  text-transform:uppercase;font-size:.56rem;margin-bottom:6px;}
.moon-side{color:var(--steel);} .moon-side .lbl{color:var(--cream-dim);}
.you-side{color:var(--cream-dim);padding-left:16px;border-left:2px solid var(--gold-soft);}
.you-side .lbl{color:var(--gold);}

/* closing + credits */
.closing{align-items:center;text-align:center;}
.close-text{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(1.3rem,2.4vw,1.9rem);line-height:1.4;color:var(--cream);}
.credits{align-items:center;text-align:center;justify-content:center;}
.quote-final{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(1.4rem,2.6vw,2rem);color:var(--gold);}
.cred-rule{width:50px;height:1px;background:var(--gold-soft);margin:24px 0;}
.cred-meta{font-family:'Oswald',sans-serif;font-weight:300;letter-spacing:.22em;
  text-transform:uppercase;font-size:.66rem;color:var(--steel);line-height:2.2;}
.blank{background:linear-gradient(110deg,var(--page),var(--page-edge));}

/* svg art animation: draw-in when its spread becomes active (stage + verse art) */
:is(.stage-art,.verse-art) .draw{stroke-dasharray:var(--len,400);stroke-dashoffset:var(--len,400);}
.spread-live :is(.stage-art,.verse-art) .draw{transition:stroke-dashoffset 1.6s ease .2s;stroke-dashoffset:0;}
.spread-live :is(.stage-art,.verse-art) .glow-fade{opacity:1;}
:is(.stage-art,.verse-art) .glow-fade{opacity:0;transition:opacity 1s ease .6s;}
/* flame flicker + orbit + twinkle in verse/stage art */
.spread-live :is(.stage-art,.verse-art) .art-flame{animation:flick 1.6s ease-in-out infinite .6s;transform-origin:center;}
@keyframes flick{0%,100%{transform:scaleY(1);opacity:.9;}50%{transform:scaleY(.8);opacity:1;}}
:is(.stage-art,.verse-art) .twinkle-art{animation:tw 3.5s ease-in-out infinite;}

/* ===== ENTRANCE ANIMATIONS (all pages) ===== */
/* Elements with .reveal start hidden; when their spread becomes live they rise+fade
   in, staggered by --d. .grow expands a rule from the centre. */
.reveal{opacity:0;transform:translateY(22px);}
.reveal.grow{transform:scaleX(0);transform-origin:left center;}
.spread-live .reveal{
  opacity:1;transform:translateY(0);
  transition:opacity .9s ease var(--d,0s), transform 1s cubic-bezier(.16,1,.3,1) var(--d,0s);
}
.spread-live .reveal.grow{transform:scaleX(1);}
/* during a page-flip, the turning faces must show their content fully */
.flip .face .reveal{opacity:1 !important;transform:none !important;}
.flip .face .reveal.grow{transform:scaleX(1) !important;}
.flip .face :is(.stage-art,.verse-art) .draw{stroke-dashoffset:0 !important;}
.flip .face :is(.stage-art,.verse-art) .glow-fade{opacity:1 !important;}
.prelive :is(.stage-art,.verse-art) .draw, .settled :is(.stage-art,.verse-art) .draw{stroke-dashoffset:0 !important;}
.prelive :is(.stage-art,.verse-art) .glow-fade, .settled :is(.stage-art,.verse-art) .glow-fade{opacity:1 !important;}
/* the right page pre-placed beneath a turning leaf shows immediately (no flash) */
.prelive .reveal{opacity:1;transform:none;}
.prelive .reveal.grow{transform:scaleX(1);}
/* a settled host (just landed from a flip) shows final state with NO transition,
   so nothing blinks or re-animates after the page turn */
.settled .reveal{opacity:1 !important;transform:none !important;transition:none !important;}
.settled .reveal.grow{transform:scaleX(1) !important;}
.settled .verse blockquote.reveal{letter-spacing:0 !important;}
/* cover moon rises + gently floats once revealed */
.cover .moon-emblem.reveal{transform:translateY(40px) scale(.7);}
.spread-live .cover .moon-emblem.reveal{transform:translateY(0) scale(1);
  transition:opacity 1s ease, transform 1.4s cubic-bezier(.16,1,.3,1);}
.spread-live .cover .moon-emblem{animation:floatM 9s ease-in-out infinite 1.4s;}
@keyframes floatM{0%,100%{filter:brightness(1);}50%{filter:brightness(1.06);}}
/* blockquote gets a subtle letterspacing settle for gravitas */
.verse blockquote.reveal{letter-spacing:.04em;}
.spread-live .verse blockquote.reveal{letter-spacing:0;
  transition:opacity 1s ease var(--d,0s), transform 1.1s cubic-bezier(.16,1,.3,1) var(--d,0s), letter-spacing 1.4s ease var(--d,0s);}

/* hint */
#hint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:55;
  font-family:'Oswald',sans-serif;font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;
  color:var(--cream-dim);opacity:.5;text-align:center;line-height:1.8;}

/* ===== music toggle (no autoplay — tap to start) ===== */
#musicBtn,#narrateBtn,#restartBtn{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));z-index:70;
  width:48px;height:48px;border-radius:50%;border:1px solid rgba(232,184,95,0.5);
  background:rgba(10,14,28,0.66);color:var(--gold);font-size:1.15rem;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);box-shadow:0 4px 18px rgba(0,0,0,0.5);
  transition:transform .2s ease, color .3s ease, box-shadow .3s ease;-webkit-tap-highlight-color:transparent;}
#musicBtn{right:16px;}
#narrateBtn{right:74px;}
#restartBtn{right:132px;}
#musicBtn svg,#narrateBtn svg,#restartBtn svg{width:22px;height:22px;}
#musicBtn:hover,#narrateBtn:hover,#restartBtn:hover{transform:scale(1.06);}
#musicBtn:active,#narrateBtn:active,#restartBtn:active{transform:scale(.94);}
#restartBtn.spin svg{animation:roSpin .6s ease;}
@keyframes roSpin{from{transform:rotate(0);}to{transform:rotate(-360deg);}}
#musicBtn.on,#narrateBtn.on{color:#fff8e6;border-color:var(--gold);animation:musPulse 2.6s ease-in-out infinite;}
@keyframes musPulse{0%,100%{box-shadow:0 0 12px 1px var(--glow);}50%{box-shadow:0 0 24px 5px var(--glow);}}
#narrateBtn.speaking{color:#fff;border-color:#fff;}

/* ===== one-time "tap anywhere to begin" overlay ===== */
#startOverlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:22px;cursor:pointer;text-align:center;padding:24px;
  background:radial-gradient(circle at 50% 38%,rgba(12,16,34,0.72),rgba(3,5,12,0.95));
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  transition:opacity .6s ease;-webkit-tap-highlight-color:transparent;}
#startOverlay.gone{opacity:0;pointer-events:none;}
#startOverlay .so-title{font-family:'Cormorant Garamond',serif;font-weight:500;font-style:italic;
  font-size:clamp(1.7rem,5.5vw,2.6rem);line-height:1.15;color:var(--cream);}
#startOverlay .so-cta{font-family:'Oswald',sans-serif;font-weight:300;letter-spacing:.26em;text-transform:uppercase;
  font-size:.82rem;color:var(--gold);border:1px solid rgba(232,184,95,0.55);border-radius:30px;
  padding:13px 28px;display:inline-flex;align-items:center;gap:11px;animation:soPulse 2.4s ease-in-out infinite;}
#startOverlay .so-sub{font-family:'Oswald',sans-serif;font-weight:300;letter-spacing:.12em;
  font-size:.74rem;color:var(--cream-dim);max-width:30ch;line-height:1.7;}
@keyframes soPulse{0%,100%{opacity:.7;}50%{opacity:1;}}
/* skip-intro link inside the overlay */
#startOverlay .so-skip{margin-top:4px;font-family:'Oswald',sans-serif;font-weight:300;letter-spacing:.2em;
  text-transform:uppercase;font-size:.66rem;color:var(--cream-dim);background:none;border:none;cursor:pointer;
  border-bottom:1px solid rgba(207,199,179,0.4);padding:4px 2px;transition:color .25s,border-color .25s;
  -webkit-tap-highlight-color:transparent;}
#startOverlay .so-skip:hover{color:var(--gold);border-color:var(--gold);}

/* ===== "now reading / paused" status pill (top-centre) ===== */
#narrStatus{position:fixed;left:50%;top:calc(14px + env(safe-area-inset-top));transform:translateX(-50%);
  z-index:71;display:none;align-items:center;gap:9px;cursor:pointer;
  font-family:'Oswald',sans-serif;font-weight:300;letter-spacing:.2em;text-transform:uppercase;font-size:.62rem;
  color:var(--cream);background:rgba(10,14,28,0.72);padding:7px 15px;border-radius:20px;
  border:1px solid rgba(232,184,95,0.32);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  box-shadow:0 4px 16px rgba(0,0,0,0.45);-webkit-tap-highlight-color:transparent;}
#narrStatus.show{display:inline-flex;}
#narrStatus .eq{display:inline-flex;gap:2px;align-items:flex-end;height:12px;}
#narrStatus .eq i{width:2.5px;height:11px;background:var(--gold);border-radius:1px;
  animation:eqbar .9s ease-in-out infinite;}
#narrStatus .eq i:nth-child(2){animation-delay:.15s;}
#narrStatus .eq i:nth-child(3){animation-delay:.30s;}
#narrStatus .eq i:nth-child(4){animation-delay:.45s;}
@keyframes eqbar{0%,100%{height:3px;}50%{height:12px;}}
#narrStatus.paused{color:var(--cream-dim);}
#narrStatus.paused .eq i{animation-play-state:paused;height:5px;background:var(--cream-dim);}
#narrStatus.music{color:var(--cream-dim);}
#narrStatus.music .eq i{background:var(--steel);}

/* back-to-library link */
#homeBtn{position:fixed;left:16px;top:calc(14px + env(safe-area-inset-top));z-index:70;
  font-family:'Oswald',sans-serif;font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;
  color:var(--cream-dim);text-decoration:none;background:rgba(10,14,28,0.6);padding:8px 14px;
  border:1px solid rgba(232,184,95,0.35);border-radius:20px;backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);transition:color .25s,border-color .25s;-webkit-tap-highlight-color:transparent;}
#homeBtn:hover{color:var(--gold);border-color:var(--gold);}

/* ===== phone portrait: single-page finger-swipe pager ===== */
#reader{display:none;}
#mNav,#mSwipe,#rotateHint{display:none;}
body.pager #book,body.pager #hint{display:none;}
body.pager #reader{display:block;position:fixed;inset:0;z-index:2;overflow:hidden;touch-action:pan-y;}
#track{display:flex;height:100%;will-change:transform;}
#track.anim{transition:transform .34s cubic-bezier(.22,1,.36,1);}
.panel{flex:0 0 100%;width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:14px;}
.page-card{position:relative;width:min(92vw,560px);height:min(86dvh,820px);height:min(86vh,820px);
  background:linear-gradient(150deg,var(--page),var(--page-edge));border-radius:10px;
  border:1px solid rgba(232,184,95,0.12);overflow:hidden;
  box-shadow:0 24px 60px -20px rgba(0,0,0,0.85), inset 0 0 60px -22px rgba(0,0,0,0.7);}
.page-card .pg{padding:34px 28px;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;}
.page-card .folio{left:28px;right:auto;top:24px;}
body.pager .page-card .folio{display:none;}
/* per-page entrance + line-art draw, triggered when a panel becomes current */
.panel .reveal{opacity:0;transform:translateY(22px);}
.panel .reveal.grow{transform:scaleX(0);transform-origin:left center;}
.panel.live .reveal{opacity:1;transform:translateY(0);
  transition:opacity .9s ease var(--d,0s), transform 1s cubic-bezier(.16,1,.3,1) var(--d,0s);}
.panel.live .reveal.grow{transform:scaleX(1);}
.panel :is(.stage-art,.verse-art) .draw{stroke-dasharray:var(--len,400);stroke-dashoffset:var(--len,400);}
.panel.live :is(.stage-art,.verse-art) .draw{transition:stroke-dashoffset 1.6s ease .2s;stroke-dashoffset:0;}
.panel :is(.stage-art,.verse-art) .glow-fade{opacity:0;transition:opacity 1s ease .6s;}
.panel.live :is(.stage-art,.verse-art) .glow-fade{opacity:1;}
.panel.live :is(.stage-art,.verse-art) .art-flame{animation:flick 1.6s ease-in-out infinite .6s;transform-origin:center;}
.panel :is(.stage-art,.verse-art) .twinkle-art{animation:tw 3.5s ease-in-out infinite;}
.panel .verse blockquote.reveal{letter-spacing:.04em;}
.panel.live .verse blockquote.reveal{letter-spacing:0;transition:letter-spacing 1.4s ease var(--d,0s);}
.panel.live .cover .moon-emblem{animation:floatM 9s ease-in-out infinite 1.4s;}
/* page counter + swipe / rotate hints (pager only) */
body.pager #mNav{display:flex;position:fixed;left:0;right:0;z-index:65;justify-content:center;
  bottom:calc(12px + env(safe-area-inset-bottom));pointer-events:none;}
#mNav .count{font-family:'Oswald',sans-serif;font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;

  <div class="phase reveal" style="--d:.15s">The Start &middot; It Is Never Too Late</div>

  <p class="refl reveal" style="--d:.85s">None of it was wasted. Every dead end taught a skill the next road needed. Your scattered years may be an apprenticeship you cannot see yet.</p>

</script>

  <!-- book engine -->
  <script>/* ===== Book engine ===== */
(function(){
  'use strict';

  // starfield
  var sf=document.getElementById('stars');
  for(var i=0;i<120;i++){
    var s=document.createElement('span'); s.className='star';
    var sz=Math.random()*2+0.4;
    s.style.width=s.style.height=sz+'px';
    s.style.top=Math.random()*100+'%'; s.style.left=Math.random()*100+'%';
    s.style.setProperty('--dur',(Math.random()*4+3)+'s');
    s.style.animationDelay=Math.random()*5+'s';
    sf.appendChild(s);
  }

  // parse pages
  var raw=document.getElementById('pagesrc').innerHTML;
  var pages=raw.split('<!--PAGE-->').map(function(p){return p.trim();}).filter(Boolean);
  // group into spreads [left,right]
  var spreads=[];
  for(var p=0;p<pages.length;p+=2){ spreads.push([pages[p], pages[p+1]||'<div class="pg blank"></div>']); }

  var book=document.getElementById('book');
  var hostL=document.getElementById('hostL');
  var hostR=document.getElementById('hostR');
  var cur=0;            // current spread index
  var animating=false;

  // ---- readable text per page/spread (for narration) ----
  var pageCb=null;                              // set via window.MB.onPage
  function htmlText(html){ var d=document.createElement('div'); d.innerHTML=html; return elText(d); }
  function elText(el){
    var c=el.cloneNode(true);
    var f=c.querySelector('.folio'); if(f) f.parentNode.removeChild(f);
    return (c.textContent||'').replace(/\s+/g,' ').trim();
  }
  function spreadText(idx){ return (htmlText(spreads[idx][0])+' '+htmlText(spreads[idx][1])).trim(); }
  function firePage(text){ if(pageCb && text) pageCb(text); }

  // Render a spread WITH entrance animations (used on first load / manual jumps)
  function renderSpread(idx){
    hostL.innerHTML=spreads[idx][0];
    hostR.innerHTML=spreads[idx][1];
    hostL.classList.remove('settled'); hostR.classList.remove('settled','prelive');
    book.classList.remove('spread-live');     // reset reveal + art animations
    void book.offsetWidth;                     // reflow
    book.classList.add('spread-live');         // trigger draw-ins + reveals
    firePage(spreadText(idx));
    if(MODE==='book') setHash(idx*2);
  }

  // Place a spread WITHOUT re-animating — content is shown final, instantly.
  // Used after a page-flip so nothing blinks or slides a second time.
  function settleSpread(idx){
    hostL.innerHTML=spreads[idx][0];
    hostR.innerHTML=spreads[idx][1];
    hostR.classList.remove('prelive');
    hostL.classList.add('settled'); hostR.classList.add('settled');
    book.classList.add('spread-live');         // keep art in drawn state
    firePage(spreadText(idx));
    if(MODE==='book') setHash(idx*2);
  }

  // ---- page flip: animate from spread `from` to `to` (to = from+1 forward) ----
  // We flip the RIGHT page of the current spread leftwards, revealing the next spread.
  var FLIP_MS=1100;
  function flipForward(done){
    if(cur>=spreads.length-1){ if(done) done(); return; }
    animating=true;
    var nextIdx=cur+1;

    // build flip leaf: front = current right page, back = next left page
    var flip=document.createElement('div'); flip.className='flip';
    var front=document.createElement('div'); front.className='face front';
    var back=document.createElement('div'); back.className='face back';
    front.innerHTML='<div class="leaf right" style="width:100%;height:100%;position:absolute;inset:0;"><div class="pg-host">'+spreads[cur][1]+'</div></div>';
    back.innerHTML='<div class="leaf left" style="width:100%;height:100%;position:absolute;inset:0;"><div class="pg-host">'+spreads[nextIdx][0]+'</div></div>';
    var shade=document.createElement('div'); shade.className='shade';
    flip.appendChild(front); flip.appendChild(back); flip.appendChild(shade);
    book.appendChild(flip);

    // reveal the next spread's RIGHT page beneath the turning leaf, so when the
    // flip passes 90deg the exposed right side already shows the next content
    hostR.innerHTML=spreads[nextIdx][1];
    hostR.classList.add('prelive');   // show its reveal elements immediately (no flash)

    var start=null;
    function ease(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }
    function step(ts){
      if(start===null) start=ts;
      var t=Math.min((ts-start)/FLIP_MS,1);
      var e=ease(t);
      var ang=-180*e;                       // 0 -> -180deg
      flip.style.transform='rotateY('+ang+'deg)';
      // shading: darken as it turns up, lighten as it lays down
      var sh = Math.sin(e*Math.PI)*0.5;
      shade.style.background='rgba(0,0,0,'+sh.toFixed(3)+')';
      if(t<1){ requestAnimationFrame(step); }
      else{
        book.removeChild(flip);
        cur=nextIdx;
        settleSpread(cur);
        animating=false;
        if(done) done();
      }
    }
    requestAnimationFrame(step);
  }

  function stepForward(){ if(!animating) flipForward(); }
  function jumpTo(idx){ cur=Math.max(0,Math.min(spreads.length-1,idx)); renderSpread(cur); }
  function prev(){ if(!animating && cur>0){ jumpTo(cur-1); } }

  // ---- auto-advance playback ----
  var DWELL_MS=4200;     // time a spread rests on screen before flipping
  var playing=false, playTimer=null;
  function play(){
    if(playing) return; playing=true;
    function cycle(){
      if(!playing) return;
      if(cur>=spreads.length-1){ playing=false; return; }
      flipForward(function(){
        playTimer=setTimeout(cycle, DWELL_MS);
      });
    }
    playTimer=setTimeout(cycle, DWELL_MS);
  }
  function stop(){ playing=false; if(playTimer) clearTimeout(playTimer); }

  // ============ PER-SPREAD VIDEO CAPTURE (.webm) ============
  // The reliable, good-looking path: record exactly what's painted on screen via
  // MediaRecorder. For each spread we record: a hold on the spread, then the flip
  // INTO the next spread, then a short hold. One .webm per spread. Convert to GIF
  // afterwards if you need GIF (e.g. CapCut, ezgif, ffmpeg). No canvas tainting,
  // real fonts, real gradients.

  var capturing=false;

  // playback timings used during capture
  var CAP_HOLD_MS=1600;   // hold on the spread before flipping
  var CAP_FLIP_MS=1100;   // the page-flip duration (matches FLIP_MS feel)
  var CAP_TAIL_MS=1400;   // hold on the next spread after the flip lands

  function wait(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }

  // Run one scripted flip from spreadIndex -> spreadIndex+1 (no-op if last).
  function scriptedFlip(spreadIndex){
    return new Promise(function(resolve){
      if(spreadIndex>=spreads.length-1){ resolve(); return; }
      var nextIdx=spreadIndex+1;
      var flip=document.createElement('div'); flip.className='flip';
      var front=document.createElement('div'); front.className='face front';
      var back=document.createElement('div'); back.className='face back';
      front.innerHTML='<div class="leaf right" style="width:100%;height:100%;position:absolute;inset:0;"><div class="pg-host">'+spreads[spreadIndex][1]+'</div></div>';
      back.innerHTML='<div class="leaf left" style="width:100%;height:100%;position:absolute;inset:0;"><div class="pg-host">'+spreads[nextIdx][0]+'</div></div>';
      var shade=document.createElement('div'); shade.className='shade';
      flip.appendChild(front); flip.appendChild(back); flip.appendChild(shade);
      book.appendChild(flip);
      hostR.innerHTML=spreads[nextIdx][1];
      hostR.classList.add('prelive');
      var start=null;
      function ease(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }
      function step(ts){
        if(start===null) start=ts;
        var t=Math.min((ts-start)/CAP_FLIP_MS,1), e=ease(t);
        flip.style.transform='rotateY('+(-180*e)+'deg)';
        shade.style.background='rgba(0,0,0,'+(Math.sin(e*Math.PI)*0.5).toFixed(3)+')';
        if(t<1){ requestAnimationFrame(step); }
        else{ book.removeChild(flip); cur=nextIdx; settleSpread(cur); resolve(); }
      }
      requestAnimationFrame(step);
    });
  }

  function startRecorder(stream){
    var mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
      ? 'video/webm;codecs=vp9' : 'video/webm';
    var chunks=[];
    var rec=new MediaRecorder(stream,{mimeType:mime, videoBitsPerSecond:10000000});
    rec.ondataavailable=function(e){ if(e.data.size) chunks.push(e.data); };
    rec._chunks=chunks; rec._mime='video/webm';
    return rec;
  }
  function downloadBlob(blob,name){
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a'); a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){URL.revokeObjectURL(url);},3000);
  }

  // Record a SINGLE spread (current) to .webm: hold -> flip into next -> tail hold.
  async function captureCurrent(){
    if(capturing) return; capturing=true; stop();
    var hint=document.getElementById('hint');
    if(!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia){
      hint.textContent='Screen capture not available in this browser.'; capturing=false; return;
    }
    var stream;
    try{
      stream=await navigator.mediaDevices.getDisplayMedia({
        video:{frameRate:60}, audio:true,
        preferCurrentTab:true, selfBrowserSurface:'include', surfaceSwitching:'exclude'
      });
    }catch(err){ capturing=false; hint.textContent='Capture cancelled.'; return; }

    var rec=startRecorder(stream);
    var idx=cur;
    var stopped=new Promise(function(res){
      rec.onstop=function(){
        stream.getTracks().forEach(function(t){t.stop();});
        downloadBlob(new Blob(rec._chunks,{type:rec._mime}), 'moon-book-'+String(idx+1).padStart(2,'0')+'.webm');
        res();
      };
    });
    stream.getVideoTracks()[0].addEventListener('ended',function(){ if(rec.state!=='inactive') rec.stop(); });

    rec.start();
    await wait(500);
    await wait(CAP_HOLD_MS);
    await scriptedFlip(idx);
    await wait(CAP_TAIL_MS);
    if(rec.state!=='inactive') rec.stop();
    await stopped;
    capturing=false;
    hint.textContent='Saved spread '+(idx+1)+'. (Space to play \u00b7 C to capture this spread)';
  }

  // Record ALL spreads in ONE continuous .webm, flipping through the whole book.
  // This is usually what you want: one file, full page-turn sequence, then split
  // or trim later. (One share prompt, one recording.)
  async function captureAll(){
    if(capturing) return; capturing=true; stop();
    var hint=document.getElementById('hint');
    if(!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia){
      hint.textContent='Screen capture not available in this browser.'; capturing=false; return;
    }
    var stream;
    try{
      stream=await navigator.mediaDevices.getDisplayMedia({
        video:{frameRate:60}, audio:true,
        preferCurrentTab:true, selfBrowserSurface:'include', surfaceSwitching:'exclude'
      });
    }catch(err){ capturing=false; hint.textContent='Capture cancelled.'; return; }

    var rec=startRecorder(stream);
    var stopped=new Promise(function(res){
      rec.onstop=function(){
        stream.getTracks().forEach(function(t){t.stop();});
        downloadBlob(new Blob(rec._chunks,{type:rec._mime}), 'moon-book-full.webm');
        res();
      };
    });
    var aborted=false;
    stream.getVideoTracks()[0].addEventListener('ended',function(){ aborted=true; if(rec.state!=='inactive') rec.stop(); });

    jumpTo(0);
    rec.start();
    await wait(600);
    for(var s=0; s<spreads.length && !aborted; s++){
      hint.textContent='Recording spread '+(s+1)+' / '+spreads.length+' \u2026';
      await wait(CAP_HOLD_MS);
      if(s<spreads.length-1){ await scriptedFlip(s); }
    }
    await wait(CAP_TAIL_MS);
    if(rec.state!=='inactive') rec.stop();
    await stopped;
    capturing=false;
    hint.textContent='Saved full book video. (Space play \u00b7 G full video \u00b7 C this spread)';
    jumpTo(0);
  }

  // ---- controls (narration is the driver; no timed auto-flip) ----
  document.addEventListener('keydown',function(e){
    if(document.getElementById('startOverlay')) return;            // overlay handles the first key
    if(e.code==='Space'){ e.preventDefault(); if(window.__narration) window.__narration.toggle(); }  // pause / resume reading
    if(e.code==='ArrowRight'){ e.preventDefault(); stepForward(); }   // turn the page (narration follows)
    if(e.code==='ArrowLeft'){ e.preventDefault(); prev(); }
    if(e.code==='KeyG'){ e.preventDefault(); captureAll(); }      // full book -> one .webm
    if(e.code==='KeyC'){ e.preventDefault(); captureCurrent(); }  // current spread -> .webm
    if(e.code==='Escape'){ if(window.__narration) window.__narration.stop(); }
  });
  // ---- environment ----
  function isPhone(){ return window.matchMedia('(max-width:820px)').matches ||
                             window.matchMedia('(pointer:coarse) and (max-width:1024px)').matches; }
  function isPortrait(){ return window.matchMedia('(orientation:portrait)').matches; }
  var coarse=window.matchMedia('(pointer:coarse)').matches;
  var single=pages.filter(function(p){ return !/class="pg blank"/.test(p); });
  var NPAGES=single.length;
  var MODE='book';
  // map each FLAT page index (blanks included) -> its narration index (ordinal among
  // non-blank pages). Narration files are keyed by non-blank ordinal, so book/landscape
  // mode must translate flat indices or the wrong page is read / pages are skipped.
  var narrIndex=(function(){ var m=[],n=0; pages.forEach(function(p){ m.push(/class="pg blank"/.test(p)?-1:n++); }); return m; })();
  // cover/title pages are "music only" (never narrated); narration begins at the first content page
  var musicOnly={}, firstContentNarr=0;
  (function(){ var n=0, found=false; pages.forEach(function(p){
    if(/class="pg blank"/.test(p)) return;
    if(/class="pg[^"]*cover/.test(p)) musicOnly[n]=true; else if(!found){ firstContentNarr=n; found=true; }
    n++; }); })();

  // page persistence across an orientation reload, via #p=<flat page index>
  function hashPage(){ var m=/[#&]p=(\d+)/.exec(location.hash); return m?Math.max(0,Math.min(NPAGES-1,+m[1])):0; }
  function setHash(i){ i=Math.max(0,Math.min(NPAGES-1,i)); try{ history.replaceState(null,'','#p='+i); }catch(e){} }
  function hideHints(){ ['mSwipe','rotateHint'].forEach(function(id){ var e=document.getElementById(id); if(e) e.classList.add('gone'); }); }

  // ============ phone portrait: finger-swipe pager ============
  var mPanels=[], mIdx=0, track, reader, W=0;
  function applyX(x,anim){ track.classList.toggle('anim',!!anim); track.style.transform='translate3d('+x+'px,0,0)'; }
  function setIdx(i,anim){
    i=Math.max(0,Math.min(mPanels.length-1,i)); mIdx=i; W=reader.clientWidth;
    applyX(-i*W,anim); mPanels[i].classList.add('live');
    document.getElementById('mCount').textContent=(i+1)+' / '+mPanels.length;
    setHash(i); firePage(elText(mPanels[i]));
  }
  function buildPager(){
    MODE='pager'; document.body.classList.add('pager');
    reader=document.getElementById('reader'); track=document.getElementById('track');
    single.forEach(function(html){ var p=document.createElement('div'); p.className='panel';
      p.innerHTML='<div class="page-card">'+html+'</div>'; track.appendChild(p); });
    mPanels=[].slice.call(track.children); W=reader.clientWidth;
    var sx=0,sy=0,baseX=0,t0=0,axis=null,dragging=false;
    reader.addEventListener('touchstart',function(e){
      if(e.touches.length>1) return; var t=e.touches[0];
      sx=t.clientX; sy=t.clientY; baseX=-mIdx*W; axis=null; dragging=true; t0=Date.now();
      track.classList.remove('anim');
    },{passive:true});
    reader.addEventListener('touchmove',function(e){
      if(!dragging) return; var t=e.touches[0], dx=t.clientX-sx, dy=t.clientY-sy;
      if(axis===null){ if(Math.abs(dx)>8||Math.abs(dy)>8){ axis=Math.abs(dx)>Math.abs(dy)?'x':'y'; if(axis==='y'){ dragging=false; return; } } else return; }
      if(axis==='x'){ e.preventDefault(); hideHints();
        var x=baseX+dx, min=-(mPanels.length-1)*W;
        if(x>0) x*=0.35; else if(x<min) x=min+(x-min)*0.35;   // edge resistance
        applyX(x,false);
      }
    },{passive:false});
    function end(e){
      if(!dragging){ axis=null; return; } dragging=false;
      if(axis!=='x'){ axis=null; return; }
      var dx=(e.changedTouches?e.changedTouches[0].clientX:sx)-sx, dt=Date.now()-t0, v=dx/Math.max(dt,1), target=mIdx;
      if(dx<-W*0.16 || v<-0.45) target=mIdx+1; else if(dx>W*0.16 || v>0.45) target=mIdx-1;
      setIdx(target,true); axis=null;
    }
    reader.addEventListener('touchend',end);
    reader.addEventListener('touchcancel',end);
    window.addEventListener('resize',function(){ if(MODE==='pager'){ W=reader.clientWidth; applyX(-mIdx*W,false); } });
    setIdx(hashPage(),false);
    setTimeout(hideHints,6500);
  }

  // ============ phone landscape: swipe to turn the two-page book ============
  function bindBookSwipe(){
    var sx=0,sy=0,axis=null,active=false;
    book.addEventListener('touchstart',function(e){ if(e.touches.length>1) return; sx=e.touches[0].clientX; sy=e.touches[0].clientY; axis=null; active=true; },{passive:true});
    book.addEventListener('touchmove',function(e){ if(!active||axis!==null) return; var dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy;
      if(Math.abs(dx)>10||Math.abs(dy)>10) axis=Math.abs(dx)>Math.abs(dy)?'x':'y'; },{passive:true});
    book.addEventListener('touchend',function(e){ if(!active){return;} active=false; if(axis!=='x') return;
      var dx=e.changedTouches[0].clientX-sx; if(dx<-40){ stop(); stepForward(); } else if(dx>40){ stop(); prev(); } });
  }

  // ---- init: phone-portrait → pager, otherwise (desktop / phone-landscape) → book ----
  if(isPhone() && isPortrait()){
    buildPager();
  }else{
    MODE='book';
    renderSpread(Math.floor(hashPage()/2));
    if(coarse){ bindBookSwipe(); }                       // phone landscape: swipe the book
    else{                                                // desktop: click toggles the showcase auto-advance
      book.addEventListener('click',function(){ if(document.getElementById('startOverlay')) return; if(window.__narration) window.__narration.toggle(); });
      // no auto-advance on load: the "tap to begin" overlay drives the start so narration begins on page 1
    }
  }
  // reload into the right layout when the phone is rotated across the portrait/landscape line
  var wantPager=isPhone()&&isPortrait();
  function checkMode(){ if((isPhone()&&isPortrait())!==wantPager) location.reload(); }
  ['(orientation:portrait)','(max-width:820px)'].forEach(function(q){
    var m=window.matchMedia(q); if(m.addEventListener) m.addEventListener('change',checkMode); else if(m.addListener) m.addListener(checkMode);
  });

  // ---- public API for the narration module ----
  window.MB={
    mode:function(){ return MODE; },
    pageCount:function(){ return MODE==='pager'? mPanels.length : NPAGES; },
    onPage:function(fn){ pageCb=fn; },
    curIndices:function(){                               // narration indices for the current view
      if(MODE==='pager') return [mIdx];                  // pager panels are 1:1 with non-blank pages
      var a=[]; [2*cur,2*cur+1].forEach(function(fi){     // book spread: two flat pages -> narration ordinals
        if(fi<narrIndex.length && narrIndex[fi]>=0) a.push(narrIndex[fi]);
      }); return a;
    },
    atEnd:function(){ return MODE==='pager' ? (mIdx>=mPanels.length-1) : (cur>=spreads.length-1); },
    pauseAuto:function(){ stop(); },
    goStart:function(){ stop(); if(MODE==='pager') setIdx(0,true); else jumpTo(0); },  // back to first page
    goToNarr:function(n){ stop();                                                       // jump so narration index n is shown
      if(MODE==='pager'){ setIdx(Math.max(0,Math.min(mPanels.length-1,n)),true); }
      else { var f=narrIndex.indexOf(n); if(f<0) f=0; jumpTo(Math.floor(f/2)); } },
    intro:function(i){ return !!musicOnly[i]; },                                        // music-only (cover) page?
    skipIntro:function(){ this.goToNarr(firstContentNarr); },                           // jump to the first content page
    next:function(){
      if(MODE==='pager'){ if(mIdx<mPanels.length-1) setIdx(mIdx+1,true); }
      else if(!animating && cur<spreads.length-1){ stop(); flipForward(); }
    }
  };
})();
</script>

  <!-- background music: Dvořák New World Largo (public-domain recording), with smooth fade + ducking -->
  <script>
(function(){
  'use strict';
  var btn=document.getElementById('musicBtn');
  var au=document.getElementById('bgMusic');
  if(!btn||!au) return;
  var NORMAL=0.55, DUCK=0.16, on=false, ducked=false, fadeT=null;
  au.volume=0;
  function clearFade(){ if(fadeT){ clearInterval(fadeT); fadeT=null; } }
  function fadeTo(target,ms){
    clearFade(); var from=au.volume, steps=Math.max(1,Math.round(ms/40)), i=0;
    fadeT=setInterval(function(){ i++; au.volume=Math.max(0,Math.min(1, from+(target-from)*i/steps));
      if(i>=steps){ clearFade(); if(target<=0 && au._stopAtZero){ try{au.pause();}catch(e){} au._stopAtZero=false; } } },40);
  }
  function play(){
    on=true; au._stopAtZero=false; btn.classList.add('on'); btn.setAttribute('aria-label','Pause background music');
    var p=au.play();
    if(p&&p.catch) p.catch(function(){ on=false; btn.classList.remove('on'); });   // autoplay blocked: waits for a tap
    fadeTo(ducked?DUCK:NORMAL,1200);
  }
  function pause(){
    on=false; btn.classList.remove('on'); btn.setAttribute('aria-label','Play background music');
    au._stopAtZero=true; fadeTo(0,500);
  }
  btn.addEventListener('click',function(e){ e.stopPropagation(); on?pause():play(); });
  window.__music={
    isOn:function(){ return on; }, play:play, pause:pause,
    duck:function(){ ducked=true; if(on) fadeTo(DUCK,250); },
    unduck:function(){ ducked=false; if(on) fadeTo(NORMAL,650); }
  };
})();
  </script>

  <!-- narration: per-page neural-voice audio (Piper); ducks the music while it reads -->
  <script>
(function(){
  'use strict';
  var btn=document.getElementById('narrateBtn');
  var au=document.getElementById('narrAudio');
  if(!btn||!au) return;
  var BASE='media/narration/sanders/', VER='?v=1', on=false, ready=false, files={}, queue=[], qi=0, seq=0;
  au.volume=1.0;
  fetch(BASE+'manifest.json'+VER).then(function(r){return r.json();}).then(function(m){ files=m.files||{}; ready=true; })
    .catch(function(){ btn.style.display='none'; });

  function pad(n){ return (n<10?'0':'')+n+'.mp3'+VER; }
  function duck(){ if(window.__music) window.__music.duck(); }
  function unduck(){ if(window.__music) window.__music.unduck(); }

  // visible "now reading / paused" indicator
  var statusEl=document.getElementById('narrStatus');
  function status(s){
    if(!statusEl) return; var l=statusEl.querySelector('.lbl');
    if(s==='reading'){ statusEl.className='show'; if(l) l.textContent='Reading'; }
    else if(s==='music'){ statusEl.className='show music'; if(l) l.textContent='Music · intro'; }
    else if(s==='paused'){ statusEl.className='show paused'; if(l) l.textContent='Paused · tap to resume'; }
    else { statusEl.className=''; }
  }

  var INTRO_DWELL=4500, introT=null;     // how long a music-only cover page rests before advancing
  function isIntro(i){ return window.MB && window.MB.intro && window.MB.intro(i); }
  function playCurrent(){
    if(!on) return;
    if(introT){ clearTimeout(introT); introT=null; }
    seq++; var my=seq;
    var idxs=(window.MB.curIndices()||[]);
    queue=idxs.filter(function(i){ return files[String(i)] && !isIntro(i); }); qi=0;   // skip cover (music-only) pages
    if(!queue.length){
      btn.classList.remove('speaking');
      if(idxs.some(isIntro)){                       // music-only title page: full music, no voice, then advance
        unduck(); status('music');
        introT=setTimeout(function(){ advance(my); }, INTRO_DWELL);
      } else { advance(my); }
      return;
    }
    btn.classList.add('speaking'); duck();
    playNext(my);
  }
  function playNext(my){
    if(my!==seq||!on) return;
    if(qi>=queue.length){ btn.classList.remove('speaking'); advance(my); return; }
    au.onended=function(){ playNext(my); };
    au.src=BASE+pad(queue[qi++]); au.currentTime=0;
    status('reading');
    var p=au.play(); if(p&&p.catch) p.catch(function(){});
  }
  function advance(my){
    if(my!==seq||!on) return;
    if(!window.MB.atEnd()) window.MB.next();   // -> onPage -> playCurrent for the next view
    else stop();
  }

  function kick(){ if(!on) return; if(!ready){ setTimeout(kick,150); return; } playCurrent(); }
  function start(){ if(on) return; on=true; btn.classList.add('on'); btn.setAttribute('aria-label','Stop narration');
    status('reading'); if(window.MB) window.MB.pauseAuto(); kick(); }
  // pause = stop reading but stay resumable from the current page (Space / click / status pill)
  function pause(){ if(!on) return; on=false; seq++; btn.classList.remove('on','speaking'); try{au.pause();}catch(e){}
    unduck(); btn.setAttribute('aria-label','Read aloud'); status('paused'); }
  // stop = fully off (🔊 button, end of book) — hides the indicator
  function stop(){ on=false; seq++; btn.classList.remove('on','speaking'); try{au.pause();}catch(e){} unduck();
    btn.setAttribute('aria-label','Read aloud'); status(''); }

  if(window.MB) window.MB.onPage(function(){ if(on) playCurrent(); });
  btn.addEventListener('click',function(e){ e.stopPropagation(); on?stop():start(); });          // 🔊 = on / off
  if(statusEl) statusEl.addEventListener('click',function(e){ e.stopPropagation(); on?pause():start(); });
  window.__narration={ isOn:function(){ return on; }, start:start, stop:stop, pause:pause,
    toggle:function(){ on?pause():start(); } };                                                   // Space / click = pause / resume
})();
  </script>

  <!-- "tap anywhere to begin" overlay + start-over button.
       Browsers block silent autoplay, so the overlay tap is what unlocks audio:
       music starts first, then narration 2 seconds later. -->
  <script>
(function(){
  'use strict';
  var NARR_DELAY=2000, started=false;            // music first; narration begins 2s later
  var overlay=document.getElementById('startOverlay');

  function begin(skip){                            // start music, then narration after 2s
    if(window.__music && !window.__music.isOn()) window.__music.play();
    if(skip && window.MB && window.MB.skipIntro) window.MB.skipIntro();   // jump past the cover pages first
    setTimeout(function(){
      if(window.__narration && !window.__narration.isOn()) window.__narration.start();
    }, NARR_DELAY);
  }
  function dismissOverlay(skip){
    if(started) return; started=true;
    if(overlay){ overlay.classList.add('gone'); setTimeout(function(){ if(overlay&&overlay.parentNode) overlay.parentNode.removeChild(overlay); },700); }
    begin(skip);
  }
  if(overlay){
    ['click','touchstart','keydown'].forEach(function(ev){ overlay.addEventListener(ev,function(e){ e.preventDefault(); dismissOverlay(false); },{passive:false}); });
  }else{ dismissOverlay(false); }
  // "Skip the intro" — begin, but jump straight to the first content page
  var skipBtn=document.getElementById('skipIntroBtn');
  if(skipBtn) ['click','touchstart'].forEach(function(ev){ skipBtn.addEventListener(ev,function(e){ e.preventDefault(); e.stopPropagation(); dismissOverlay(true); },{passive:false}); });
  // fallback: if the overlay is somehow bypassed, the first page interaction still starts audio
  function fallback(e){
    if(started) return;
    if(e && e.target && e.target.closest && e.target.closest('#musicBtn,#narrateBtn,#restartBtn,#homeBtn,#skipIntroBtn,a,button')) return;
    dismissOverlay(false);
  }
  ['pointerdown','keydown'].forEach(function(ev){ window.addEventListener(ev,fallback,true); });

  // ---- start over: back to page 1, music keeps playing, read again from the top ----
  var rb=document.getElementById('restartBtn');
  if(rb) rb.addEventListener('click',function(e){
    e.stopPropagation();
    rb.classList.remove('spin'); void rb.offsetWidth; rb.classList.add('spin');
    if(window.MB) window.MB.goStart();                                   // jump to first page
    if(window.__music && !window.__music.isOn()) window.__music.play();  // ensure music is on
    if(window.__narration){ window.__narration.stop(); window.__narration.start(); }   // read from the top
  });
})();
  </script>
</body>
