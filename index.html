<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Motivation — An Illustrated Library</title>
<meta name="description" content="A small library of illustrated, animated readings — the best of what moves us, and what it really means. Flip through on any phone.">
<meta name="theme-color" content="#05070f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<!-- Open Graph: rich link preview for WhatsApp / social shares -->
<meta property="og:type" content="website">
<meta property="og:title" content="Motivation — An Illustrated Library">
<meta property="og:description" content="Illustrated, animated readings of the most motivational speeches and texts — and what they really mean. Tap to open and flip through.">
<meta property="og:url" content="https://johnagius.github.io/motivation/">
<meta property="og:image" content="https://johnagius.github.io/motivation/preview.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Spectral:wght@300;400&family=Oswald:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --void:#05070f; --deep:#0a0e1c; --ink:#0c1226;
  --cream:#f3ecd9; --cream-dim:#cfc7b3;
  --gold:#e8b85f; --gold-soft:#c89a4a; --steel:#7d93b8;
  --glow:rgba(232,184,95,0.35);
  --page:#100a06; --page-edge:#1d1812;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;}
body{
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(30,42,74,0.55), transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 95%, rgba(232,184,95,0.06), transparent 60%),
    var(--void);
  color:var(--cream); font-family:'Spectral',serif; min-height:100vh; overflow-x:hidden;
}
/* starfield */
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.star{position:absolute;background:#fff;border-radius:50%;animation:tw var(--dur,4s) ease-in-out infinite;opacity:.5;}
@keyframes tw{0%,100%{opacity:.12;}50%{opacity:.8;}}
/* grain */
body::after{content:"";position:fixed;inset:0;z-index:60;pointer-events:none;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

.wrap{position:relative;z-index:2;max-width:1080px;margin:0 auto;padding:clamp(48px,8vw,96px) 22px 80px;}

/* ===== header ===== */
header{text-align:center;margin-bottom:clamp(40px,6vw,72px);}
.moon-emblem{width:74px;height:74px;border-radius:50%;margin:0 auto 26px;
  background:radial-gradient(circle at 35% 30%,#fdfbf3,#d8d2c0 45%,#9b9685 80%,#6f6b5e);
  box-shadow:0 0 50px 6px var(--glow),inset -8px -6px 18px rgba(0,0,0,0.5);
  animation:floatM 9s ease-in-out infinite;}
@keyframes floatM{0%,100%{transform:translateY(0);filter:brightness(1);}50%{transform:translateY(-7px);filter:brightness(1.06);}}
.eyebrow{font-family:'Oswald',sans-serif;font-weight:300;letter-spacing:.4em;text-transform:uppercase;
  font-size:.66rem;color:var(--gold);margin-bottom:16px;}
header h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(2.6rem,7vw,4.4rem);
  line-height:1;color:var(--cream);}
header h1 em{font-style:italic;color:var(--gold);}
.tagline{font-weight:300;font-style:italic;font-size:clamp(1rem,2.2vw,1.25rem);color:var(--cream-dim);
  max-width:560px;margin:20px auto 0;line-height:1.6;}

/* ===== grid of books ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:28px;}
.card{display:flex;flex-direction:column;text-decoration:none;color:inherit;
  background:linear-gradient(150deg,var(--ink),var(--deep));border:1px solid rgba(232,184,95,0.12);
  border-radius:12px;overflow:hidden;box-shadow:0 18px 44px -22px rgba(0,0,0,0.85);
  transition:transform .35s cubic-bezier(.16,1,.3,1), box-shadow .35s ease, border-color .35s ease;}
.card:hover{transform:translateY(-6px);border-color:rgba(232,184,95,0.4);
  box-shadow:0 26px 60px -22px rgba(0,0,0,0.9), 0 0 28px -6px var(--glow);}
.thumb{position:relative;aspect-ratio:1200/630;background-size:cover;background-position:center;
  border-bottom:1px solid rgba(232,184,95,0.12);}
.thumb::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(5,7,15,0.55));}
.card-body{padding:22px 24px 26px;display:flex;flex-direction:column;flex:1;}
.src{font-family:'Oswald',sans-serif;font-weight:300;letter-spacing:.24em;text-transform:uppercase;
  font-size:.6rem;color:var(--steel);margin-bottom:10px;}
.card-body h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.7rem;line-height:1.1;
  color:var(--cream);margin-bottom:12px;}
.card-body p{font-weight:300;font-size:.98rem;line-height:1.6;color:var(--cream-dim);margin-bottom:18px;}
.open{margin-top:auto;font-family:'Oswald',sans-serif;font-weight:400;letter-spacing:.18em;
  text-transform:uppercase;font-size:.66rem;color:var(--gold);transition:letter-spacing .3s ease;}
.card:hover .open{letter-spacing:.26em;}

/* "more to come" placeholder card */
.card.soon{align-items:center;justify-content:center;text-align:center;min-height:240px;
  border-style:dashed;border-color:rgba(125,147,184,0.25);background:rgba(12,18,38,0.4);cursor:default;}
.card.soon:hover{transform:none;box-shadow:0 18px 44px -22px rgba(0,0,0,0.85);border-color:rgba(125,147,184,0.25);}
.card.soon span{font-family:'Oswald',sans-serif;font-weight:300;letter-spacing:.24em;text-transform:uppercase;
  font-size:.66rem;color:var(--steel);padding:40px 24px;}

footer{text-align:center;margin-top:64px;font-family:'Oswald',sans-serif;font-weight:300;
  letter-spacing:.22em;text-transform:uppercase;font-size:.6rem;color:var(--steel);opacity:.7;line-height:2;}
</style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="wrap">
    <header>
      <div class="moon-emblem"></div>
      <div class="eyebrow">An Illustrated Library</div>
      <h1>Motiv<em>a</em>tion</h1>
      <p class="tagline">The best of what moves us — speeches, texts, films — illustrated, animated, and read for what they really mean.</p>
    </header>
    <main class="grid" id="grid"></main>
    <footer>Tap a book to open &middot; flip &amp; read on any phone</footer>
  </div>

  <script>
  /* starfield */
  (function(){
    var sf=document.getElementById('stars');
    for(var i=0;i<110;i++){
      var s=document.createElement('span'); s.className='star';
      var sz=Math.random()*2+0.4;
      s.style.width=s.style.height=sz+'px';
      s.style.top=Math.random()*100+'%'; s.style.left=Math.random()*100+'%';
      s.style.setProperty('--dur',(Math.random()*4+3)+'s');
      s.style.animationDelay=Math.random()*5+'s';
      sf.appendChild(s);
    }
  })();

  /* ---- the library: add a new entry here for each book ---- */
  var BOOKS=[
    {
      href:'moon-book.html',
      thumb:'preview.png',
      source:'John F. Kennedy · Rice University, 1962',
      title:'We Choose to Go to the Moon',
      blurb:'JFK’s Moon speech — its best lines, and what each one means for your own hard climb. With the eight-stage journey to the Moon as a map for doing the impossible.'
    },
    {
      href:'arnold-book.html',
      thumb:'arnold-preview.png',
      source:'Arnold Schwarzenegger · On Success',
      title:'Sleep Faster',
      blurb:'Arnold’s rules for success — have a vision, sleep faster, work your butt off, ignore the naysayers, and do it all with a smile. Six rules, with reflections for your own climb.'
    }
  ];

  (function(){
    var grid=document.getElementById('grid');
    BOOKS.forEach(function(b){
      var a=document.createElement('a');
      a.className='card'; a.href=b.href;
      a.innerHTML=
        '<div class="thumb" style="background-image:url(\''+b.thumb+'\')"></div>'+
        '<div class="card-body">'+
          '<div class="src">'+b.source+'</div>'+
          '<h2>'+b.title+'</h2>'+
          '<p>'+b.blurb+'</p>'+
          '<span class="open">Open book &rsaquo;</span>'+
        '</div>';
      grid.appendChild(a);
    });
    // a gentle "more coming" tile
    var soon=document.createElement('div');
    soon.className='card soon';
    soon.innerHTML='<span>More readings<br>coming soon</span>';
    grid.appendChild(soon);
  })();
  </script>
</body>
</html>
